name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  license:
    name: License
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: ./utils/license-check.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [format, license]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings -D clippy::pedantic

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  doc:
    name: Doc
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --workspace --no-deps

  build_examples:
    name: Build Examples
    runs-on: ubuntu-latest
    needs: [test, doc]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build and lint simple example
        working-directory: examples/simple
        run: |
          cargo build
          cargo clippy -- -D warnings -D clippy::pedantic
      - name: Build and lint elaborate example
        working-directory: examples/elaborate
        run: |
          cargo build
          cargo clippy -- -D warnings -D clippy::pedantic

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, doc]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build
